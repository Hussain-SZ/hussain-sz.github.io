about_content: | # this will include new lines to allow paragraphs
  I'm a Software Engineer with a passion for building scalable applications and exploring emerging technologies. Currently pursuing a BS in Computer Science with a minor in Computer Engineering at LUMS, graduating June 2026.

  My experience spans full-stack development using the MERN stack, microservice monitoring, workflow automation, and game development with Unity. As a Teaching Assistant, I've supported 500+ students across multiple core CS courses, reinforcing my commitment to knowledge sharing.

  I'm driven by the intersection of software engineering and practical problem-solving, whether through building intuitive user interfaces or automating complex workflows with AI agents.

